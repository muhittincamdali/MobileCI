name: Elite Swift 6 CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.0"
        
    - name: Build (Strict Concurrency)
      run: swift build -Xswiftc -strict-concurrency=complete
      
    - name: Run Tests
      run: swift test --parallel
      
    - name: Check Binary Size
      run: |
        SIZE=$(du -sk .build/debug/*.dylib | awk '{print $1}')
        echo "Binary size: ${SIZE}KB"
        if [ $SIZE -gt 1000 ]; then
          echo "Warning: Binary size exceeds 1MB threshold for world-class efficiency."
        fi
